name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v0.1.0 or v0.1.0-alpha.1)'
        required: true
        type: string

jobs:
  build-wheels-reusable:
    name: Build wheels (reusable)
    uses: ./.github/workflows/build-wheels-reusable.yml

  publish-pypi:
    name: Publish to PyPI
    needs: build-wheels-reusable
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/traj-dist-rs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheelhouse/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: wheelhouse/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true
          packages-dir: wheelhouse/

  publish-crates:
    name: Publish to crates.io
    needs: build-wheels-reusable
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/traj-dist-rs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [build-wheels-reusable, publish-pypi, publish-crates]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: wheelhouse/

      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: wheelhouse/

      - name: Parse Version and Type
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          
          if [[ "$VERSION" =~ "alpha" || "$VERSION" =~ "beta" || "$VERSION" =~ "rc" || "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_type=Pre-release" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=Release" >> $GITHUB_OUTPUT
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Final Decision:"
          echo "  Version: $VERSION"
          echo "  Is Prerelease: ${{ steps.meta.outputs.is_prerelease }}"
          echo "  Release Type: ${{ steps.meta.outputs.release_type }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: traj-dist-rs ${{ steps.meta.outputs.version }}
          body: |
            ## ${{ steps.meta.outputs.release_type }} Notes

            Please edit this draft release to add your release notes.

            ### Installation

            ```bash
            pip install traj-dist-rs==${{ steps.meta.outputs.version }}
            ```

            ### What's Changed
            
            ${{ github.event.compare }}

          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          draft: true
          files: |
            wheelhouse/*.whl
            wheelhouse/*.tar.gz
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Display Summary
        run: |
          echo "✅ ${{ steps.meta.outputs.release_type }} draft created!"
          echo "Version: ${{ steps.meta.outputs.version }}"
          echo "Is Prerelease: ${{ steps.meta.outputs.is_prerelease }}"
